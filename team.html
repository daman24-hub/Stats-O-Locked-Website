<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team | Stats-O-Locked</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Outfit",sans-serif;
  background:#0a0a0f;
  color:#fff;
  overflow-x:hidden;
}

/* canvas */
#bg-canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* navbar */
.navbar{
  position:sticky;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav-container{
  max-width:1200px;
  margin:auto;
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:"Space Grotesk";
  font-weight:700;
  font-size:1.6rem;
  color:#fff;
  text-decoration:none;
}

.highlight{color:#00f0ff;}

.nav-links{
  list-style:none;
  display:flex;
  gap:2rem;
}

.nav-links a{
  text-decoration:none;
  color:#ccc;
  transition:0.3s;
}

.nav-links a:hover{
  color:#00f0ff;
}

/* container */
.container{
  max-width:1200px;
  margin:auto;
  padding:4rem 2rem;
}

.team-page-title{
  text-align:center;
  font-size:2.5rem;
  margin-bottom:3rem;
}

/* sections */
.tier-section{margin-bottom:3rem;}

.tier-label{
  font-size:1.5rem;
  margin-bottom:1rem;
  color:#aaa;
}

/* grid */
.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1.5rem;
}

/* card */
.team-card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:1.5rem;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.4s;
  position:relative;
  overflow:hidden;
  text-align:center;
}

.team-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(0,255,255,0.2),transparent);
  opacity:0;
  transition:0.4s;
}

.team-card:hover::before{opacity:1;}

.team-card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 0 25px rgba(0,255,255,0.25);
}

.team-card img{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:1rem;
}

.team-card h3{font-size:1.1rem;}
.team-card p{font-size:0.9rem;color:#aaa;}

@media(max-width:768px){
  .nav-links{display:none;}
}
</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<nav class="navbar">
  <div class="nav-container">
    <a href="#" class="logo">SOL<span class="highlight">.</span></a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Team</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <h1 class="team-page-title">OUR <span class="highlight">TEAM</span></h1>

  <section class="tier-section">
    <h2 class="tier-label">Executive Board</h2>
    <div id="exec-grid" class="team-grid"></div>
  </section>

  <section class="tier-section">
    <h2 class="tier-label">Secretariat</h2>
    <div id="sec-grid" class="team-grid"></div>
  </section>

  <section class="tier-section">
    <h2 class="tier-label">Leads & Co-Leads</h2>
    <div id="leads-grid" class="team-grid"></div>
  </section>

  <section class="tier-section">
    <h2 class="tier-label">Core Members</h2>
    <div id="core-grid" class="team-grid"></div>
  </section>
</div>

<script>
// TEAM DATA
const teamData = {
  exec:[
    {name:"Shivam Waghule",role:"President",img:"https://github.com/Ankit-Mahadani/Stats-O-Locked-Website/blob/main/pics/shivam.jpeg?raw=true"},
    {name:"Shagun",role:"Vice President",img:""}
  ],
  sec:[
    {name:"Khyati",role:"Secretary",img:""},
    {name:"A",role:"Joint Secretary",img:""}
  ],
  leads:[
    {name:"Bhuvi Jain",role:"Tech Lead",img:""},
    {name:"Ankit",role:"Tech CO lead",img:""}
  ],
  core:[
    {name:"Daman",role:" Tech Core Member",img:""},
    {name:"Prathmesh",role:"Tech Core Member",img:""}
  ]
};

// create cards
function createCards(data,id){
  const container=document.getElementById(id);

  data.forEach(m=>{
    const card=document.createElement("div");
    card.className="team-card";

    card.innerHTML=`
      <img src="${m.img}">
      <h3>${m.name}</h3>
      <p>${m.role}</p>
    `;

    container.appendChild(card);
  });
}

createCards(teamData.exec,"exec-grid");
createCards(teamData.sec,"sec-grid");
createCards(teamData.leads,"leads-grid");
createCards(teamData.core,"core-grid");

// particles
const canvas=document.getElementById("bg-canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#00f0ff";
    ctx.fill();

    if(p.x<0)p.x=canvas.width;
    if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;
    if(p.y>canvas.height)p.y=0;
  });

  requestAnimationFrame(animate);
}
animate();

// resize
window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
