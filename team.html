<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | Stats-O-Locked</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SOL<span class="highlight">.</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="team-page-title">OUR <span class="highlight">TEAM</span></h1>

        <section class="tier-section">
            <h2 class="tier-label">Executive Board</h2>
            <div id="exec-grid" class="team-grid"></div> </section>

        <section class="tier-section">
            <h2 class="tier-label">Secretariat</h2>
            <div id="sec-grid" class="team-grid"></div> </section>

        <section class="tier-section">
            <h2 class="tier-label">Leads & Co-Leads</h2>
            <div id="leads-grid" class="team-grid"></div> </section>

        <section class="tier-section">
            <h2 class="tier-label">Core Members</h2>
            <div id="core-grid" class="team-grid"></div> </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
   
    <script src="app.js"></script>
    <script id="gsap-ultimate">
gsap.registerPlugin(ScrollTrigger);

/* ================= TITLE ANIMATION ================= */
gsap.from(".team-page-title", {
    y: 80,
    opacity: 0,
    duration: 1.2,
    ease: "power4.out"
});

/* ================= TIER LABEL ================= */
gsap.from(".tier-label", {
    scrollTrigger: {
        trigger: ".tier-label",
        start: "top 85%",
    },
    y: 40,
    opacity: 0,
    duration: 0.8,
    ease: "power3.out"
});

/* ================= CARDS STAGGER REVEAL ================= */
gsap.from(".member-card", {
    scrollTrigger: {
        trigger: ".team-grid",
        start: "top 80%",
    },
    y: 80,
    opacity: 0,
    scale: 0.9,
    duration: 1,
    stagger: 0.2,
    ease: "power3.out"
});

/* ================= PARALLAX EFFECT ================= */
gsap.to(".img-circle", {
    scrollTrigger: {
        trigger: ".team-section",
        scrub: true
    },
    y: -50,
    ease: "none"
});

/* ================= SMOOTH FLOAT BOOST ================= */
gsap.to(".member-card", {
    y: -10,
    duration: 2,
    repeat: -1,
    yoyo: true,
    ease: "sine.inOut",
    stagger: {
        each: 0.2,
        from: "random"
    }
});

/* ================= HOVER DEPTH BOOST ================= */
document.querySelectorAll(".member-card").forEach(card => {
    card.addEventListener("mouseenter", () => {
        gsap.to(card, {
            scale: 1.08,
            duration: 0.3,
            ease: "power2.out"
        });
    });

    card.addEventListener("mouseleave", () => {
        gsap.to(card, {
            scale: 1,
            duration: 0.3,
            ease: "power2.out"
        });
    });
});
</script>
</body>
</html>
